{% extends "base.html" %}

{% block title %}{% if member %}Editar Membro{% else %}Novo Membro{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if member %}Editar Papel na Família{% else %}Registrar Novo Ente{% endif %}</h1>
    <a href="{{ url_for('member.index') }}" class="btn" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-secondary);">Voltar à Listagem</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <form method="POST">
        
        <div style="margin-bottom: 1.5rem;">
            <label for="family_id" style="display: block; margin-bottom: 0.8rem; color: var(--text-secondary); font-weight: 500; font-size: 0.95rem;">Associação à Família Mãe</label>
            <select id="family_id" name="family_id" required
                    style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                           background-color: var(--bg-color); color: var(--text-primary); font-size: 1.1rem;
                           outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transition: border-color 0.2s; cursor: pointer;">
                <option value="" disabled {% if not member %}selected{% endif %}>Selecione a Família correspondente</option>
                {% for f in families %}
                <option value="{{ f.id }}" {% if member and member.family_id == f.id %}selected{% endif %}>
                    {{ f.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 2rem;">
            <label for="name" style="display: block; margin-bottom: 0.8rem; color: var(--text-secondary); font-weight: 500; font-size: 0.95rem;">Nome / Identidade</label>
            <input type="text" id="name" name="name" 
                   value="{% if member %}{{ member.name }}{% endif %}" 
                   placeholder="Ex: Pedro Henrique"
                   required
                   autocomplete="off"
                   style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background-color: rgba(0,0,0,0.3); color: var(--text-primary); font-size: 1.1rem;
                          outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transition: border-color 0.2s;">
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <button type="submit" class="btn btn-success" style="padding: 0.8rem 2rem; font-size: 1rem;">
                {% if member %}Salvar Atualização{% else %}Garantir Participação{% endif %}
            </button>
        </div>
    </form>
</div>

<!-- Estética para Foco Input e Select interativo (No-JS bloat) -->
<script>
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(el => {
        el.addEventListener('focus', () => el.style.borderColor = 'var(--accent-glow)');
        el.addEventListener('blur', () => el.style.borderColor = 'var(--glass-border)');
    });
</script>
{% endblock %}
