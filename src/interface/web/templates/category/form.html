{% extends "base.html" %}

{% block title %}{{ 'Editar' if category else 'Nova' }} Categoria{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Editar' if category else 'Nova' }} Categoria</h1>
    <a href="{{ url_for('category.index') }}" class="btn" style="background-color: transparent; border: 1px solid var(--glass-border);">Voltar</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group">
            <label for="name" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Nome da Categoria</label>
            <input type="text" id="name" name="name" class="form-control" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background-color: rgba(0,0,0,0.2); color: var(--text-primary); margin-bottom: 1.5rem;" value="{{ category.name if category else '' }}" placeholder="Ex: Mercado" required>
        </div>
        
        <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Tipo da Transação</label>
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="radio" name="type" value="EXPENSE" {% if not category or category.type.value == 'EXPENSE' %}checked{% endif %}>
                    Despesa
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="radio" name="type" value="INCOME" {% if category and category.type.value == 'INCOME' %}checked{% endif %}>
                    Receita
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-success" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
            {{ 'Salvar Alterações' if category else 'Criar Categoria' }}
        </button>
    </form>
</div>
{% endblock %}
